baseURL: "https://daniel-strauss.github.io/blog/"
languageCode: "en-us"
title: "Blog of Daniel Strauss"
theme: [PaperMod]

markup:
  defaultMarkdownHandler: pandoc
  goldmark:
    renderer:
      unsafe: true

security:
  exec:
    allow:
      - ^(dart-)?sass(-embedded)?$
      - ^go$
      - ^git$
      - ^npx$
      - ^postcss$
      - ^tailwindcss$
      - ^pandoc$


params:
  homeInfoParams:
    Title: Contents
    Content: 


  math:
    use: true
    config: |
      MathJax.Hub.Config({
        tex: {
          packages: {'[+]': ['bbm']}
        },
        TeX: {
          Macros: {
            mathbbm: ["{\\mathbbm{#1}}",1]
          }
        }
      });
    version: "3.2"
    url: "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"

socialIcons: # optional
  - name: "<platform>"
    url: "<link>"
  - name: "<platform 2>"
    url: "<link2>"


      
